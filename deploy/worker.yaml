apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-worker
  namespace: prefect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-worker
  template:
    metadata:
      labels:
        app: prefect-worker
    spec:
      serviceAccountName: prefect-worker
      containers:
        - name: worker
          image: prefecthq/prefect:3-python3.11-kubernetes
          command:
            - prefect
            - worker
            - start
            - --pool
            - kubernetes-pool
          env:
            - name: PREFECT_API_URL
              value: http://prefect-server.prefect.svc.cluster.local:4200/api
            - name: PREFECT_API_AUTH_STRING
              valueFrom:
                secretKeyRef:
                  name: prefect-auth
                  key: auth-string
            - name: PREFECT_INTEGRATIONS_KUBERNETES_OBSERVER_NAMESPACES
              value: prefect
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prefect-worker
  namespace: prefect
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prefect-worker
  namespace: prefect
rules:
  - apiGroups: [""]
    resources: ["events", "pods", "pods/log", "pods/status"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prefect-worker
  namespace: prefect
subjects:
  - kind: ServiceAccount
    name: prefect-worker
    namespace: prefect
roleRef:
  kind: Role
  name: prefect-worker
  apiGroup: rbac.authorization.k8s.io
