server:
  replicaCount: 1

  basicAuth:
    enabled: false  # auth moves to Traefik IngressRoute

  uiConfig:
    prefectUiApiUrl: "https://DOMAIN_PLACEHOLDER/api"

  env:
    - name: PREFECT_SERVER_UI_SHOW_PROMOTIONAL_CONTENT
      value: "false"

  extraEnvVarsCM: prefect-docket-config

backgroundServices:
  runAsSeparateDeployment: true
  replicaCount: 1
  extraEnvVarsCM: prefect-docket-config

postgresql:
  enabled: true
  auth:
    enablePostgresUser: false
    database: prefect
    username: prefect
  primary:
    persistence:
      enabled: true
      size: 10Gi

redis:
  enabled: true
  architecture: standalone

ingress:
  enabled: false  # replaced by IngressRoute CRDs + Certificate CR in deploy/prefect-ingress-route.yaml
