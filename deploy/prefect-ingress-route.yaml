---
# BasicAuth middleware — credentials from prefect-traefik-auth secret (htpasswd format)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: prefect-admin-auth
  namespace: prefect
spec:
  basicAuth:
    secret: prefect-traefik-auth

---
# Public IngressRoute — GETs and explicit safe read POSTs, no auth required (priority 20)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prefect-public
  namespace: prefect
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`DOMAIN_PLACEHOLDER`) && Method(`GET`)
      kind: Rule
      priority: 20
      services:
        - name: prefect-server
          port: 4200
    - match: "Host(`DOMAIN_PLACEHOLDER`) && Method(`POST`) && (Path(`/api/flows/filter`) || Path(`/api/flows/count`) || Path(`/api/flows/paginate`) || Path(`/api/flow_runs/filter`) || Path(`/api/flow_runs/count`) || Path(`/api/flow_runs/paginate`) || Path(`/api/flow_runs/history`) || Path(`/api/flow_runs/lateness`) || Path(`/api/task_runs/filter`) || Path(`/api/task_runs/count`) || Path(`/api/task_runs/paginate`) || Path(`/api/task_runs/history`) || Path(`/api/deployments/filter`) || Path(`/api/deployments/count`) || Path(`/api/deployments/paginate`) || Path(`/api/artifacts/filter`) || Path(`/api/artifacts/count`) || Path(`/api/artifacts/latest/filter`) || Path(`/api/artifacts/latest/count`) || Path(`/api/work_pools/filter`) || Path(`/api/work_pools/count`) || Path(`/api/work_queues/filter`) || Path(`/api/logs/filter`) || Path(`/api/events/filter`) || Path(`/api/events/count-by/day`) || Path(`/api/events/count-by/event_type`) || Path(`/api/events/count-by/resource_id`) || Path(`/api/variables/filter`) || Path(`/api/variables/count`) || Path(`/api/automations/filter`) || Path(`/api/automations/count`) || Path(`/api/block_types/filter`) || Path(`/api/block_schemas/filter`) || Path(`/api/block_documents/filter`) || Path(`/api/concurrency_limits/filter`) || Path(`/api/v2/concurrency_limits/filter`))"
      kind: Rule
      priority: 20
      services:
        - name: prefect-server
          port: 4200
  tls:
    secretName: prefect-server-tls

---
# Admin IngressRoute — catch-all, BasicAuth required (priority 10)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prefect-admin
  namespace: prefect
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`DOMAIN_PLACEHOLDER`)
      kind: Rule
      priority: 10
      middlewares:
        - name: prefect-admin-auth
      services:
        - name: prefect-server
          port: 4200
  tls:
    secretName: prefect-server-tls
