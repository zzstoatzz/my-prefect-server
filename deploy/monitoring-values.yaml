# lightweight kube-prometheus-stack — follows relay/indigo pattern
alertmanager:
  enabled: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

kubeApiServer:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false

kubeDns:
  enabled: false

coreDns:
  enabled: false

kubelet:
  enabled: true
  serviceMonitor:
    cAdvisor: true

prometheus:
  prometheusSpec:
    scrapeInterval: 60s
    retention: 7d
    serviceMonitorSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        memory: 200Mi
      limits:
        memory: 512Mi

  prometheusOperator:
    resources:
      requests:
        memory: 64Mi
      limits:
        memory: 128Mi

grafana:
  enabled: true
  adminPassword: bufobufobufo

  # Ubuntu image required — DuckDB plugin uses glibc binaries, Alpine won't work
  image:
    repository: grafana/grafana
    tag: "latest-ubuntu"

  grafana.ini:
    auth.anonymous:
      enabled: true
      org_role: Viewer
    server:
      root_url: "https://GRAFANA_DOMAIN_PLACEHOLDER"
    plugins:
      allow_loading_unsigned_plugins: motherduck-duckdb-datasource

  # plugin not in Grafana registry — pre-installed on node via `just install-grafana-plugin`
  # grafana reads a snapshot copy of the DuckDB — never the live file.
  # a busybox sidecar refreshes the snapshot every 60s so the DuckDB plugin
  # can't take an exclusive lock on the production database.

  extraVolumeMounts:
    - name: duckdb-plugin
      mountPath: /var/lib/grafana/plugins/motherduck-duckdb-datasource
      readOnly: true
    - name: analytics-snapshot
      mountPath: /analytics
      readOnly: true

  extraInitContainers:
    # seed the snapshot before grafana starts so the datasource has data on first boot
    - name: snapshot-seed
      image: busybox:1
      command: ["sh", "-c"]
      args:
        - |
          src=/analytics-src/analytics.duckdb
          dst=/analytics-snap/analytics.duckdb
          until [ -f "$src" ]; do echo "waiting for $src"; sleep 5; done
          cp "$src" "$dst"
      volumeMounts:
        - name: analytics-duckdb
          mountPath: /analytics-src
          readOnly: true
        - name: analytics-snapshot
          mountPath: /analytics-snap

  # extraContainers is templated as a string in grafana chart 7.x (tpl . $)
  extraContainers: |
    - name: snapshot-sync
      image: busybox:1
      command: ["sh", "-c"]
      args:
        - |
          src=/analytics-src/analytics.duckdb
          dst=/analytics-snap/analytics.duckdb
          while true; do
            [ -f "$src" ] && cp "$src" "$dst"
            sleep 60
          done
      volumeMounts:
        - name: analytics-duckdb
          mountPath: /analytics-src
          readOnly: true
        - name: analytics-snapshot
          mountPath: /analytics-snap

  extraVolumes:
    - name: duckdb-plugin
      hostPath:
        path: /var/lib/grafana-plugins/motherduck-duckdb-datasource
        type: Directory
    - name: analytics-duckdb
      hostPath:
        path: /var/lib/prefect-analytics
        type: DirectoryOrCreate
    - name: analytics-snapshot
      emptyDir: {}

  additionalDataSources:
    - name: DuckDB
      uid: duckdb
      type: motherduck-duckdb-datasource
      access: proxy
      isDefault: false
      jsonData:
        path: /analytics/analytics.duckdb

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard

  resources:
    requests:
      memory: 192Mi
    limits:
      memory: 384Mi
