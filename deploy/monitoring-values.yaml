# lightweight kube-prometheus-stack — follows relay/indigo pattern
alertmanager:
  enabled: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

kubeApiServer:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false

kubeDns:
  enabled: false

coreDns:
  enabled: false

kubelet:
  enabled: true
  serviceMonitor:
    cAdvisor: true

prometheus:
  prometheusSpec:
    scrapeInterval: 60s
    retention: 7d
    serviceMonitorSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        memory: 200Mi
      limits:
        memory: 512Mi

  prometheusOperator:
    resources:
      requests:
        memory: 64Mi
      limits:
        memory: 128Mi

grafana:
  enabled: true
  adminPassword: bufobufobufo

  # Ubuntu image required — DuckDB plugin uses glibc binaries, Alpine won't work
  image:
    repository: grafana/grafana
    tag: "latest-ubuntu"

  grafana.ini:
    auth.anonymous:
      enabled: true
      org_role: Viewer
    server:
      root_url: "https://GRAFANA_DOMAIN_PLACEHOLDER"
    plugins:
      allow_loading_unsigned_plugins: motherduck-duckdb-datasource

  # plugin not in Grafana registry — download from GitHub releases via init container
  initContainers:
    - name: install-duckdb-plugin
      image: alpine:3.19
      command:
        - sh
        - -c
        - |
          apk add --no-cache unzip curl --quiet
          curl -fsSL https://github.com/motherduckdb/grafana-duckdb-datasource/releases/download/v0.4.1/motherduck-duckdb-datasource-0.4.1.zip \
            -o /tmp/plugin.zip
          unzip -o /tmp/plugin.zip -d /var/lib/grafana/plugins/
          echo "installed: $(ls /var/lib/grafana/plugins/)"
      volumeMounts:
        - name: grafana-plugins
          mountPath: /var/lib/grafana/plugins

  extraVolumes:
    - name: grafana-plugins
      emptyDir: {}
    - name: analytics-duckdb
      hostPath:
        path: /var/lib/prefect-analytics
        type: DirectoryOrCreate

  extraVolumeMounts:
    - name: grafana-plugins
      mountPath: /var/lib/grafana/plugins
    - name: analytics-duckdb
      mountPath: /analytics
      readOnly: true

  additionalDataSources:
    - name: DuckDB
      uid: duckdb
      type: motherduck-duckdb-datasource
      access: proxy
      isDefault: false
      jsonData:
        path: /analytics/analytics.duckdb

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard

  resources:
    requests:
      memory: 192Mi
    limits:
      memory: 384Mi
