name: my-prefect-server

pull:
  - prefect.deployments.steps.run_shell_script:
      script: |
        bash -c "git clone --depth 1 --branch main https://tangled.sh/zzstoatzz.io/my-prefect-server.git my-prefect-server || git clone --depth 1 --branch main https://github.com/zzstoatzz/my-prefect-server.git my-prefect-server"
  - prefect.deployments.steps.set_working_directory:
      directory: my-prefect-server

deployments:
  - name: diagnostics
    entrypoint: flows/diagnostics.py:diagnostics
    work_pool:
      name: kubernetes-pool
    schedules:
      - cron: "*/5 * * * *"

  - name: gh-notifications
    entrypoint: flows/gh_notifications.py:gh_notifications
    work_pool:
      name: kubernetes-pool
    schedules:
      - cron: "0 * * * *"  # hourly
    parameters:
      only_unread: true

  - name: cleanup
    entrypoint: flows/cleanup.py:cleanup
    work_pool:
      name: kubernetes-pool
    schedules:
      - cron: "0 2 * * 0"
    parameters:
      config:
        days_to_keep: 30
        states_to_clean: ["Completed", "Failed", "Cancelled", "Crashed"]
        batch_size: 100
        rate_limit_delay: 0.5
        dry_run: false
