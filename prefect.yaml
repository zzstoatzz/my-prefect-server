name: my-prefect-server

pull:
  - prefect.deployments.steps.run_shell_script:
      script: |
        git clone --depth 1 --branch main https://tangled.sh/zzstoatzz.io/my-prefect-server.git my-prefect-server \
          || git clone --depth 1 --branch main https://github.com/zzstoatzz/my-prefect-server.git my-prefect-server
  - prefect.deployments.steps.set_working_directory:
      directory: my-prefect-server

deployments:
  - name: diagnostics
    entrypoint: flows/diagnostics.py:diagnostics
    work_pool:
      name: kubernetes-pool
    schedules:
      - cron: "*/5 * * * *"
