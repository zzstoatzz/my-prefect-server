name: my-prefect-server

pull:
  - prefect.deployments.steps.run_shell_script:
      script: |
        bash -c "rm -rf my-prefect-server && (git clone --depth 1 --branch main https://tangled.sh/zzstoatzz.io/my-prefect-server.git my-prefect-server || git clone --depth 1 --branch main https://github.com/zzstoatzz/my-prefect-server.git my-prefect-server) && cd my-prefect-server && pip install -q -U uv && export PATH=\"$HOME/.local/bin:$PATH\" UV_PROJECT_ENVIRONMENT=.venv && uv python install 3.14 && uv sync --python 3.14"
  - prefect.deployments.steps.set_working_directory:
      directory: my-prefect-server

deployments:
  - name: diagnostics
    entrypoint: flows/diagnostics.py:diagnostics
    work_pool:
      name: kubernetes-pool
      job_variables:
        command: uv run prefect flow-run execute
    schedules:
      - cron: "*/5 * * * *"

  - name: gh-notifications
    entrypoint: flows/gh_notifications.py:gh_notifications
    work_pool:
      name: kubernetes-pool
      job_variables:
        command: uv run prefect flow-run execute
    schedules:
      - cron: "0 * * * *"  # hourly
    parameters:
      only_unread: true

  - name: tangled-items
    entrypoint: flows/tangled_items.py:tangled_items
    work_pool:
      name: kubernetes-pool
      job_variables:
        command: uv run prefect flow-run execute
    schedules:
      - cron: "0 * * * *"  # hourly

  - name: enrich
    entrypoint: flows/enrich.py:enrich
    work_pool:
      name: kubernetes-pool
      job_variables:
        command: uv run prefect flow-run execute
    concurrency_limit: 1
    schedules:
      - cron: "5 * * * *"  # 5 minutes after gh-notifications

  - name: cleanup
    entrypoint: flows/cleanup.py:cleanup
    work_pool:
      name: kubernetes-pool
      job_variables:
        command: uv run prefect flow-run execute
    schedules:
      - cron: "0 2 * * 0"
    parameters:
      config:
        days_to_keep: 30
        states_to_clean: ["Completed", "Failed", "Cancelled", "Crashed"]
        batch_size: 100
        rate_limit_delay: 0.5
        dry_run: false
