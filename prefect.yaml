name: my-prefect-server

pull:
  - prefect.deployments.steps.run_shell_script:
      script: |
        bash -c "rm -rf my-prefect-server && (git clone --depth 1 --branch main https://tangled.sh/zzstoatzz.io/my-prefect-server.git my-prefect-server || git clone --depth 1 --branch main https://github.com/zzstoatzz/my-prefect-server.git my-prefect-server)"
  - prefect.deployments.steps.set_working_directory:
      directory: my-prefect-server

definitions:
  work_pools:
    k8s: &k8s
      name: kubernetes-pool
      job_variables:
        command: >-
          uv run
          --with 'my-prefect-server @ git+https://github.com/zzstoatzz/my-prefect-server.git'
          prefect flow-run execute

deployments:
  - name: diagnostics
    entrypoint: flows/diagnostics.py:diagnostics
    work_pool: *k8s
    schedules:
      - cron: "*/5 * * * *"
        active: false

  - name: ingest
    entrypoint: flows/ingest.py:ingest
    work_pool: *k8s
    schedules:
      - cron: "0 * * * *"  # hourly
    parameters:
      only_unread: true

  - name: transform
    entrypoint: flows/transform.py:transform
    work_pool:
      name: kubernetes-pool
      job_variables:
        command: >-
          uv run --python 3.13
          --with 'my-prefect-server @ git+https://github.com/zzstoatzz/my-prefect-server.git'
          prefect flow-run execute
    concurrency_limit: 1
    triggers:
      - type: event
        expect:
          - "prefect.flow-run.Completed"
        match_related:
          prefect.resource.name: "ingest"
          prefect.resource.role: "deployment"

  - name: cleanup
    entrypoint: flows/cleanup.py:cleanup
    work_pool: *k8s
    schedules:
      - cron: "0 2 * * 0"
    parameters:
      config:
        days_to_keep: 30
        states_to_clean: ["Completed", "Failed", "Cancelled", "Crashed"]
        batch_size: 100
        rate_limit_delay: 0.5
        dry_run: false

  - name: brief
    entrypoint: flows/brief.py:brief
    work_pool: *k8s
    triggers:
      - type: event
        expect:
          - "prefect.flow-run.Completed"
        match_related:
          prefect.resource.name: "transform"
          prefect.resource.role: "deployment"

  - name: compact
    entrypoint: flows/compact.py:compact
    work_pool: *k8s
    triggers:
      - type: event
        expect:
          - "prefect.flow-run.Completed"
        match_related:
          prefect.resource.name: "transform"
          prefect.resource.role: "deployment"

  - name: morning
    entrypoint: flows/morning.py:morning
    work_pool: *k8s
    schedules:
      - cron: "0 13 * * *"  # 8am CT daily

  - name: curate
    entrypoint: flows/curate.py:curate
    work_pool: *k8s
    triggers:
      - type: event
        expect:
          - "prefect.flow-run.Completed"
        match_related:
          prefect.resource.name: "morning"
          prefect.resource.role: "deployment"

  - name: rebuild-atlas
    entrypoint: flows/atlas.py:rebuild_atlas
    work_pool: *k8s
    schedules:
      - cron: "0 */6 * * *"  # every 6 hours
