[project]
name = "mps"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "prefect>=3.0",
    "httpx>=0.27",
    "duckdb>=1.0",
    "pydantic>=2",
    "pydantic-ai-slim[anthropic,prefect]",
    "turbopuffer",
    "openai",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
